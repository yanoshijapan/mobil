<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pemakaian Mobil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #005A9C; 
            --accent-blue: #3498db; 
            --accent-green: #2ecc71;
            --light-gray: #f4f7f6; /* Latar abu-abu sangat terang */
            --dark-gray: #7f8c8d; 
            --bg-white: #ffffff; /* Latar utama putih */
            --text-color: #2c3e50; /* Teks warna gelap */
            --border-color: #e0e0e0;
            --shadow-soft: 0 8px 25px rgba(0, 90, 156, 0.08);
            --shadow-hover: 0 12px 30px rgba(0, 90, 156, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--light-gray); color: var(--text-color); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }

        #login-section { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80vh; width: 100%; max-width: 400px; margin: 0 auto; }
        .login-card { background: var(--bg-white); padding: 40px 30px; border-radius: 20px; box-shadow: var(--shadow-soft); width: 100%; text-align: center; border: 1px solid var(--border-color); }
        .login-card h2 { color: var(--primary-blue); margin-bottom: 25px; font-weight: 700; font-size: 1rem;}
		.login-logo {
            width: 90px; 
            height: auto;
            margin-bottom: 15px;
            border-radius: 10px; 
            object-fit: contain;
        }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--dark-gray); transition: color 0.3s; }
        .password-toggle:hover { color: var(--primary-blue); }
        
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-white); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        .loader-spinner { width: 50px; height: 50px; border: 5px solid var(--light-gray); border-top: 5px solid var(--primary-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .main-container { width: 100%; max-width: 500px; opacity: 0; transform: translateY(20px); animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; }
        header h1 { color: var(--primary-blue); font-size: 1.8rem; font-weight: 700; margin: 0; }
		.header-logo {
		    height: 20px; /* Anda bisa mengubah angka ini (misal 30px atau 50px) sesuai selera */
		    width: auto;
		    object-fit: contain;
		}
        .btn-logout { background: none; border: none; color: #e74c3c; cursor: pointer; font-weight: 600; font-size: 1rem; font-family: 'Poppins', sans-serif; display: flex; align-items: center; gap: 5px; transition: color 0.3s; }
        .btn-logout:hover { color: #c0392b; }

        .car-card { background-color: var(--bg-white); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow-soft); border: 1px solid var(--border-color); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .car-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
        .car-image-container { height: 120px; border-radius: 10px; margin-bottom: 15px; background-size: cover; background-position: center; border: 1px solid var(--border-color); }
        .car-card[data-car-name="Avanza KZU"] .car-image-container { background-image: url('https://yanoshijapan.github.io/asetonline/kzu.jpg'); }
        .car-card[data-car-name="Innova KFV"] .car-image-container { background-image: url('https://yanoshijapan.github.io/asetonline/kfv.jpg'); }
        .car-header { display: flex; align-items: center; gap: 15px; font-size: 1.5rem; font-weight: 600; color: var(--primary-blue); }
        .car-header i { color: var(--accent-blue); }
        
        .fuel-container { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .fuel-icon { font-size: 1.5rem; color: var(--accent-blue); }
        .fuel-bar-background { flex-grow: 1; height: 20px; background-color: var(--border-color); border-radius: 10px; overflow: hidden; }
        .fuel-bar-percentage { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-blue), var(--primary-blue)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.8rem; transition: width 1s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .maintenance-info { margin-top: 15px; padding: 10px; background-color: #e8f4f8; border-radius: 8px; text-align: center; font-size: 0.9rem; font-weight: 600; color: var(--primary-blue); display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid #d1eaf5; }
        .status-section { margin-top: 15px; }
        .current-status { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .status-available { color: var(--accent-green); }
        .status-in-use { color: #e74c3c; }
        .status-booked { color: #f39c12; }
        
        .booking-list-title { font-size: 0.9rem; font-weight: 600; color: var(--dark-gray); margin-bottom: 5px; }
        .booking-list { list-style: none; padding-left: 5px; max-height: 150px; overflow-y: auto; }
        .booking-list li { font-size: 0.9rem; padding: 8px 5px; border-bottom: 1px solid var(--light-gray); display: flex; justify-content: space-between; align-items: center; color: var(--text-color); }
        .no-booking { font-style: italic; color: #aaa; font-size: 0.9rem; }
        
        .button-group { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn { text-decoration: none; color: white; padding: 12px 5px; border-radius: 8px; text-align: center; font-weight: 600; border: none; cursor: pointer; font-size: 0.8rem; transition: opacity 0.3s ease, transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-booking { background-color: var(--primary-blue); }
        .btn-start { background-color: var(--accent-green); }
        .btn-finish { background-color: var(--dark-gray); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); display: none; justify-content: center; align-items: flex-start; padding-top: 5vh; overflow-y: auto; opacity: 0; z-index: 1000; transition: opacity 0.4s ease; backdrop-filter: blur(3px); }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background-color: var(--bg-white); color: var(--text-color); padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: scale(0.9); animation: zoomIn 0.4s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; margin-bottom: 5vh; border: 1px solid var(--border-color); }
        @keyframes zoomIn { to { transform: scale(1); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--light-gray); padding-bottom: 10px; }
        .modal-header h2 { font-size: 1.4rem; color: var(--primary-blue); font-weight: 700; }
        .modal-close-btn { font-size: 1.8rem; color: var(--dark-gray); cursor: pointer; border: none; background: none; transition: color 0.3s; }
        .modal-close-btn:hover { color: #e74c3c; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: var(--primary-blue); }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 0.95rem; transition: border-color 0.3s, box-shadow 0.3s; background-color: var(--bg-white); color: var(--text-color); }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2); }
        
        .modal-submit-btn { width: 100%; padding: 15px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; }
        .modal-submit-btn:hover { background-color: #004578; }
        .modal-submit-btn:disabled { background-color: var(--dark-gray); cursor: wait; }
        
        .radio-group input[type="radio"] { opacity: 0; position: fixed; width: 0; }
        .radio-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
        .radio-group label { display: inline-block; padding: 10px; background-color: var(--bg-white); border: 2px solid var(--border-color); border-radius: 8px; text-align: center; cursor: pointer; font-weight: 600; font-size: 0.85rem; color: var(--text-color); transition: all 0.3s ease; -webkit-tap-highlight-color: transparent; }
        .radio-group label:hover { border-color: var(--accent-blue); }
        .radio-group input[type="radio"]:checked + label { background-color: #e8f4f8; color: var(--primary-blue); border-color: var(--primary-blue); }
        
        .photo-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .photo-preview img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; border: 1px solid var(--border-color); }
        
        .history-button-container { text-align: center; margin-top: 25px; margin-bottom: 20px; }
        .btn-history { background-color: var(--dark-gray); padding: 12px 25px; font-size: 1rem; color: white; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; width: 100%; transition: background-color 0.3s; }
        .btn-history:hover { background-color: #5d6d7e; }
        
        #history-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        #history-table th, #history-table td { border: 1px solid var(--border-color); padding: 10px; text-align: left; font-size: 0.9rem; }
        #history-table th { background-color: var(--primary-blue); color: white; }
        #history-table tr:nth-child(even) { background-color: var(--light-gray); }
    </style>
</head>
<body>

    <div id="loading-screen" style="display: none;">
        <div class="loader-spinner"></div>
        <p style="margin-top: 20px; color: var(--primary-blue); font-weight: 600; font-size: 1.1rem;">Memuat Data...</p>
    </div>

    <div id="login-section">
        <div class="login-card">
						<img src="https://yanoshijapan.github.io/asetonline/exatagrup.png" alt="Logo Perusahaan" class="login-logo">
            <h2>Dashboard Pemakaian Mobil</h2>
            <p style="color: var(--dark-gray); margin-bottom: 20px; font-size: 0.9rem;">Silakan masuk untuk melanjutkan</p>
            <form id="login-form">
                <input type="hidden" name="formType" value="login">
                <div class="form-group">
                    <input type="text" id="username" name="username" placeholder="Username" required>
                </div>
                <div class="form-group password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <i class="fas fa-eye password-toggle" id="toggle-password"></i>
                </div>
                <button type="submit" class="modal-submit-btn" id="login-btn">Masuk</button>
            </form>
        </div>
    </div>

    <main class="main-container" id="dashboard-section" style="display: none;">
        <header>
		    <img src="https://yanoshijapan.github.io/asetonline/exatagrup.png" alt="Logo Dashboard" class="header-logo">
		    
		    <button id="logout-btn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</button>
		</header>
        
        <div id="cars-details-container">
            </div>
        
        <div class="history-button-container">
            <button class="btn btn-history" id="open-history-btn"><i class="fas fa-history"></i> Cek Riwayat Pengguna</button>
        </div>
    </main>

    <div id="booking-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><h2 id="booking-modal-title">Booking Mobil</h2><button class="modal-close-btn">&times;</button></div>
            <form id="booking-form">
                <input type="hidden" name="formType" value="booking">
                <input type="hidden" id="booking-car-name-input" name="carName">
                <div class="form-group"><label for="nama-lengkap">Nama Lengkap</label><input type="text" id="nama-lengkap" name="namaLengkap" required readonly></div>
                <div class="form-group"><label for="tanggal-pakai">Tanggal Digunakan</label><input type="date" id="tanggal-pakai" name="tanggalPakai" required></div>
                <div class="form-group"><label for="keperluan">Keperluan</label><textarea id="keperluan" name="keperluan" rows="2" required></textarea></div>
                <div class="form-group"><label for="tujuan">Tujuan</label><input type="text" id="tujuan" name="tujuan" required></div>
                <div class="form-group"><label for="mulai-jam">Mulai Dipakai Jam</label><input type="time" id="mulai-jam" name="mulaiJam" required></div>
                <div class="form-group"><label for="estimasi">Estimasi Pemakaian (Contoh: 3 jam)</label><input type="text" id="estimasi" name="estimasi" required></div>
                <button type="submit" class="modal-submit-btn">Booking Sekarang</button>
            </form>
        </div>
    </div>

    <div id="start-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><h2 id="start-modal-title">Form Mulai Pakai</h2><button class="modal-close-btn">&times;</button></div>
            <form id="start-form">
                <input type="hidden" name="formType" value="mulai">
                <input type="hidden" id="start-car-name-input" name="carName">
                <div class="form-group"><label for="start-tanggal-cek">Tanggal Cek</label><input type="date" id="start-tanggal-cek" name="tanggalCek" required></div>
                <div class="form-group"><label for="start-nama-pengguna">Nama Pengguna (Terjadwal)</label><input type="text" id="start-nama-pengguna" name="namaPengguna" required readonly></div>
                <div class="form-group">
                    <label>Kondisi Ban</label>
                    <div class="radio-group">
                        <input type="radio" id="start-ban-baik" name="kondisiBan" value="Baik" required><label for="start-ban-baik">Baik</label>
                        <input type="radio" id="start-ban-cukup" name="kondisiBan" value="Cukup"><label for="start-ban-cukup">Cukup</label>
                        <input type="radio" id="start-ban-periksa" name="kondisiBan" value="Perlu Diperiksa"><label for="start-ban-periksa">Perlu Diperiksa</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Kondisi Lampu</label>
                    <div class="radio-group">
                        <input type="radio" id="start-lampu-ok" name="kondisiLampu" value="Semua Menyala" required><label for="start-lampu-ok">Semua Menyala</label>
                        <input type="radio" id="start-lampu-mati" name="kondisiLampu" value="Ada yang Mati"><label for="start-lampu-mati">Ada yang Mati</label>
                    </div>
                </div>
                <div class="form-group"><label for="start-interior">Kebersihan Interior</label><select id="start-interior" name="interior" required><option value="">Pilih...</option><option>Sangat Bersih</option><option>Bersih</option><option>Tidak Terlalu Kotor</option><option>Kotor</option><option>Sangat Kotor</option></select></div>
                <div class="form-group"><label for="start-eksterior">Kebersihan Eksterior</label><select id="start-eksterior" name="eksterior" required><option value="">Pilih...</option><option>Sangat Bersih</option><option>Bersih</option><option>Tidak Terlalu Kotor</option><option>Kotor</option><option>Sangat Kotor</option></select></div>
                <div class="form-group"><label for="start-km-awal">Kilometer Awal</label><input type="number" id="start-km-awal" name="kmAwal" required></div>
                <div class="form-group"><label for="start-bensin-awal">Bensin Awal (dari sistem)</label><input type="number" id="start-bensin-awal" name="bensinAwal" required readonly></div>
                <div class="form-group"><label for="start-saldo-etoll">Saldo Awal E-Toll</label><input type="number" id="start-saldo-etoll" name="saldoEtoll" required></div>
                <div class="form-group"><label for="start-catatan">Catatan Lain (Opsional)</label><textarea id="start-catatan" name="catatan" rows="3"></textarea></div>
                <div class="form-group"><label for="start-photo-upload">Upload Foto (Maks 5)</label><input type="file" id="start-photo-upload" class="photo-upload" accept="image/*" multiple><div class="photo-preview"></div></div>
                <button type="submit" class="modal-submit-btn">Mulai Pakai</button>
            </form>
        </div>
    </div>
    
    <div id="finish-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><h2 id="finish-modal-title">Form Selesai Pakai</h2><button class="modal-close-btn">&times;</button></div>
            <form id="finish-form">
                <input type="hidden" name="formType" value="selesai">
                <input type="hidden" id="finish-car-name-input" name="carName">
                <div class="form-group"><label for="finish-tanggal-cek">Tanggal Cek</label><input type="date" id="finish-tanggal-cek" name="tanggalCek" required></div>
                <div class="form-group"><label for="finish-nama-pengecek">Nama Pengguna (Aktif)</label><input type="text" id="finish-nama-pengecek" name="namaPengecek" required readonly></div>
                <div class="form-group">
                    <label>Kondisi Ban</label>
                    <div class="radio-group">
                        <input type="radio" id="finish-ban-baik" name="kondisiBan" value="Baik" required><label for="finish-ban-baik">Baik</label>
                        <input type="radio" id="finish-ban-cukup" name="kondisiBan" value="Cukup"><label for="finish-ban-cukup">Cukup</label>
                        <input type="radio" id="finish-ban-periksa" name="kondisiBan" value="Perlu Diperiksa"><label for="finish-ban-periksa">Perlu Diperiksa</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Kondisi Lampu</label>
                    <div class="radio-group">
                        <input type="radio" id="finish-lampu-ok" name="kondisiLampu" value="Semua Menyala" required><label for="finish-lampu-ok">Semua Menyala</label>
                        <input type="radio" id="finish-lampu-mati" name="kondisiLampu" value="Ada yang Mati"><label for="finish-lampu-mati">Ada yang Mati</label>
                    </div>
                </div>
                <div class="form-group"><label for="finish-interior">Kebersihan Interior</label><select id="finish-interior" name="interior" required><option value="">Pilih...</option><option>Sangat Bersih</option><option>Bersih</option><option>Tidak Terlalu Kotor</option><option>Kotor</option><option>Sangat Kotor</option></select></div>
                <div class="form-group"><label for="finish-eksterior">Kebersihan Eksterior</label><select id="finish-eksterior" name="eksterior" required><option value="">Pilih...</option><option>Sangat Bersih</option><option>Bersih</option><option>Tidak Terlalu Kotor</option><option>Kotor</option><option>Sangat Kotor</option></select></div>
                <div class="form-group"><label for="finish-km-akhir">Kilometer Akhir</label><input type="number" id="finish-km-akhir" name="kmAkhir" required></div>
                <div class="form-group"><label for="finish-sisa-bensin">Sisa Bensin (angka 10-400)</label><input type="number" id="finish-sisa-bensin" name="sisaBensin" min="10" max="400" required></div>
                <div class="form-group"><label for="finish-saldo-etoll">Saldo Akhir E-Toll</label><input type="number" id="finish-saldo-etoll" name="saldoEtoll" required></div>
                <div class="form-group"><label for="finish-catatan">Catatan Lain (Opsional)</label><textarea id="finish-catatan" name="catatan" rows="3"></textarea></div>
                <div class="form-group"><label for="finish-photo-upload">Upload Foto (Maks 5)</label><input type="file" id="finish-photo-upload" class="photo-upload" accept="image/*" multiple><div class="photo-preview"></div></div>
                <button type="submit" class="modal-submit-btn">Kirim Laporan</button>
            </form>
        </div>
    </div>

    <div id="history-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header"><h2>Riwayat Pengguna Selesai</h2><button class="modal-close-btn">&times;</button></div>
            <div style="overflow-x:auto;">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Nama</th>
                            <th>Tujuan</th>
                            <th>Sisa E-Toll</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const SPREADSHEET_URL = 'https://script.google.com/macros/s/AKfycbwhDjzv-sAJXvHnQt1IuO-UCi3E3M3paMx9oeLqnSgQ3SQbD27ecYCWJgnTCNs4dfVEwQ/exec';

        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loadingScreen = document.getElementById('loading-screen');
        const carsContainer = document.getElementById('cars-details-container');

        const loginForm = document.getElementById('login-form');
        const logoutBtn = document.getElementById('logout-btn');
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        const bookingModal = document.getElementById('booking-modal');
        const startModal = document.getElementById('start-modal');
        const finishModal = document.getElementById('finish-modal');
        const historyModal = document.getElementById('history-modal');
        
        const bookingForm = document.getElementById('booking-form');
        const startForm = document.getElementById('start-form');
        const finishForm = document.getElementById('finish-form');
        const openHistoryBtn = document.getElementById('open-history-btn');

        let dataRefreshInterval; 

        const loggedInUser = localStorage.getItem('activeUser');
        if (loggedInUser) {
            masukKeDashboard(loggedInUser);
        }

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('login-btn');
            submitBtn.textContent = 'Memverifikasi...';
            submitBtn.disabled = true;
            
            const formData = new FormData(loginForm);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch(SPREADSHEET_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                const result = await response.json(); 

                if (result.status === 'success') {
                    localStorage.setItem('activeUser', result.user);
                    masukKeDashboard(result.user);
                } else {
                    alert(result.message || "Username atau Password salah!");
                }
            } catch (error) {
                console.error("Error Login:", error);
                alert('Pastikan web app Google Script sudah di-deploy dengan akses "Anyone". Error: ' + error.message);
            } finally {
                submitBtn.textContent = 'Masuk';
                submitBtn.disabled = false;
            }
        });

        logoutBtn.addEventListener('click', () => {
            if(confirm('Apakah Anda yakin ingin keluar?')) {
                localStorage.removeItem('activeUser');
                clearInterval(dataRefreshInterval); 
                loginForm.reset();
                dashboardSection.style.display = 'none';
                loginSection.style.display = 'flex';
            }
        });

        function masukKeDashboard(username) {
            loginSection.style.display = 'none';
            loadingScreen.style.display = 'flex';
            
            document.getElementById('nama-lengkap').value = username;
      
            fetchAndDisplayCarData().then(() => {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    loadingScreen.style.opacity = '1'; 
                    dashboardSection.style.display = 'block';
                   
                    if(!dataRefreshInterval) {
                        dataRefreshInterval = setInterval(fetchAndDisplayCarData, 60000);
                    }
                }, 500);
            });
        }

        async function fetchAndDisplayCarData() {
            try {
                const response = await fetch(SPREADSHEET_URL);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                renderCarCards(data.carData);
                renderHistory(data.historyData);
            } catch (error) {
                console.error("Gagal mengambil data:", error);
                carsContainer.innerHTML = `<p style="text-align:center; color:#e74c3c; padding:20px;">Gagal memuat data dari server.<br><small>${error.message}</small></p>`;
            }
        }

        function renderCarCards(cars) {
            carsContainer.innerHTML = '';
            cars.forEach(car => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.setAttribute('data-car-name', car.name);
                
                const fuelPercentage = calculateFuelPercentage(car.fuel);
                const nextBookingUser = car.upcomingBookings.length > 0 ? car.upcomingBookings[0].user : '';
        
                let currentStatusHTML = '';
                switch (car.currentStatus.status) {
                    case 'Dipakai':
                        currentStatusHTML = `<div class="current-status status-in-use">Dipakai oleh: ${car.currentStatus.user}</div>`;
                        break;
                    case 'Di-booking':
                        currentStatusHTML = `<div class="current-status status-booked">Di-booking oleh: ${car.currentStatus.user}</div>`;
                        break;
                    default:
                        currentStatusHTML = `<div class="current-status status-available">Tersedia</div>`;
                        break;
                }
        
                let upcomingListHTML = car.upcomingBookings.length > 0 
                    ? `<ul class="booking-list">${car.upcomingBookings.map(b => `<li><span class="user-name" style="font-weight:600;">${b.user}</span><span class="time-info" style="text-align:right; font-size:0.8rem;">${b.date}<br>Jam ${b.startTime}</span></li>`).join('')}</ul>`
                    : `<p class="no-booking">Belum ada jadwal booking.</p>`;
        
                card.innerHTML = `
                    <div class="car-image-container"></div>
                    <div class="car-header"><i class="fas fa-car-side fa-lg"></i><h2>${car.name}</h2></div>
                    <div class="fuel-container">
                        <i class="fas fa-gas-pump fuel-icon"></i>
                        <div class="fuel-bar-background"><div class="fuel-bar-percentage" style="width: ${fuelPercentage}%;">${Math.round(fuelPercentage)}%</div></div>
                    </div>
                    
                    <div class="maintenance-info">
                        <i class="fas fa-oil-can"></i>
                        <span>${car.kmToService.toLocaleString('id-ID')} KM lagi untuk ganti oli</span>
                    </div>

                    <div class="status-section">
                        ${currentStatusHTML}
                        <div class="booking-list-title">Jadwal Booking:</div>
                        ${upcomingListHTML}
                    </div>
                    <div class="button-group">
                        <button class="btn btn-booking" data-car-name="${car.name}"><i class="fas fa-calendar-plus"></i> Booking</button>
                        <button class="btn btn-start" data-car-name="${car.name}" data-next-user="${nextBookingUser}" data-fuel="${car.fuel}"><i class="fas fa-play"></i> Mulai Pakai</button>
                        <button class="btn btn-finish" data-car-name="${car.name}" data-current-user="${car.currentStatus.user || ''}"><i class="fas fa-stop"></i> Selesai</button>
                    </div>`;
                carsContainer.appendChild(card);
            });
        }
        
        function renderHistory(history) {
            const tableBody = document.getElementById('history-table-body');
            if (!tableBody) return;
            tableBody.innerHTML = ''; 
            if (!history || history.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Tidak ada riwayat.</td></tr>`;
                return;
            }
            history.forEach(item => {
                const row = `<tr><td>${item.tanggal}</td><td style="font-weight:600; color:var(--primary-blue);">${item.nama}</td><td>${item.tujuan}</td><td style="font-family:monospace;">${item.etoll}</td></tr>`;
                tableBody.innerHTML += row;
            });
        }

        function calculateFuelPercentage(fuel) {
            const minFuel = 10; const maxFuel = 400;
            const clampedFuel = Math.max(minFuel, Math.min(fuel, maxFuel));
            return ((clampedFuel - minFuel) / (maxFuel - minFuel)) * 100;
        }

        function openModal(modal) { modal.classList.add('show'); }
        function closeModal(modal) { modal.classList.remove('show'); }

        document.querySelectorAll('.modal-close-btn').forEach(btn => btn.onclick = () => btn.closest('.modal-overlay').classList.remove('show'));
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.onclick = (e) => { if (e.target === overlay) e.target.classList.remove('show'); }
        });

        // Event Listener untuk Tombol-tombol Card Mobil
        carsContainer.addEventListener('click', (e) => {
            const target = e.target.closest('.btn'); // Cari tombol terdekat jika icon di-klik
            if (!target) return;
            const carName = target.dataset.carName;
            if (!carName) return;

            const currentUserLogin = localStorage.getItem('activeUser');

            if (target.classList.contains('btn-booking')) {
                document.getElementById('booking-modal-title').textContent = `Booking ${carName}`;
                document.getElementById('booking-car-name-input').value = carName;
                document.getElementById('tanggal-pakai').min = new Date().toISOString().split("T")[0];
                openModal(bookingModal);
            } else if (target.classList.contains('btn-start')) {
                const nextUser = target.dataset.nextUser;
                const fuel = target.dataset.fuel;
                if (!nextUser) { alert("Tidak ada jadwal booking untuk mobil ini."); return; }
                if (nextUser !== currentUserLogin && currentUserLogin !== "Admin") {
                    alert(`Hanya ${nextUser} yang dapat memulai pemakaian ini.`); return;
                }
                startForm.reset();
                document.getElementById('start-modal-title').textContent = `Mulai Pakai ${carName}`;
                document.getElementById('start-car-name-input').value = carName;
                document.getElementById('start-nama-pengguna').value = nextUser;
                document.getElementById('start-bensin-awal').value = fuel;
                document.getElementById('start-tanggal-cek').valueAsDate = new Date();
                openModal(startModal);
            } else if (target.classList.contains('btn-finish')) {
                const currentUser = target.dataset.currentUser;
                if (!currentUser) { alert("Mobil ini sedang tidak dipakai oleh siapapun."); return; }
                if (currentUser !== currentUserLogin && currentUserLogin !== "Admin") {
                    alert(`Hanya ${currentUser} yang sedang memakai mobil ini yang dapat menyelesaikannya.`); return;
                }
                finishForm.reset();
                document.getElementById('finish-modal-title').textContent = `Selesai Pakai ${carName}`;
                document.getElementById('finish-car-name-input').value = carName;
                document.getElementById('finish-nama-pengecek').value = currentUser;
                document.getElementById('finish-tanggal-cek').valueAsDate = new Date();
                openModal(finishModal);
            }
        });
        
        openHistoryBtn.addEventListener('click', () => openModal(historyModal));

        // Event Handler General untuk Form Mulai, Selesai, Booking
        async function handleFormSubmit(form, event) {
            event.preventDefault();
            const submitBtn = form.querySelector('.modal-submit-btn');
            submitBtn.disabled = true;
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengirim...';
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            if (form.id === 'start-form' || form.id === 'finish-form') {
                const photoInput = form.querySelector('.photo-upload');
                data.photos = await getUploadedFiles(photoInput);
            }

            try {
                // Untuk POST form (Booking, Mulai, Selesai), mode 'no-cors' bisa digunakan jika tidak butuh baca return JSON
                await fetch(SPREADSHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert(`Laporan berhasil dikirim!`);
                closeModal(form.closest('.modal-overlay'));
                
                // Tampilkan loading update sebentar lalu refresh data
                loadingScreen.querySelector('p').textContent = "Memperbarui Data...";
                loadingScreen.style.display = 'flex';
                loadingScreen.style.opacity = '1';
                
                setTimeout(() => {
                    fetchAndDisplayCarData().then(() => {
                        loadingScreen.style.opacity = '0';
                        setTimeout(() => loadingScreen.style.display = 'none', 500);
                    });
                }, 2000); // Beri jeda ke GAS untuk memproses spreadsheet
                
            } catch (error) {
                console.error('Error submitting form:', error);
                alert('Terjadi kesalahan saat mengirim laporan.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        }

        bookingForm.addEventListener('submit', (e) => handleFormSubmit(bookingForm, e));
        startForm.addEventListener('submit', (e) => handleFormSubmit(startForm, e));
        finishForm.addEventListener('submit', (e) => handleFormSubmit(finishForm, e));

        // Fungsi Convert Foto
        async function getUploadedFiles(fileInput) {
            const files = Array.from(fileInput.files).slice(0, 5);
            const filePromises = files.map(file => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve({ name: file.name, mimeType: file.type, data: e.target.result.split(',')[1] });
                    reader.onerror = error => reject(error);
                    reader.readAsDataURL(file);
                });
            });
            return await Promise.all(filePromises);
        }

        // Preview Foto
        document.querySelectorAll('.photo-upload').forEach(input => {
            input.addEventListener('change', (e) => {
                const previewContainer = e.target.nextElementSibling;
                previewContainer.innerHTML = '';
                const files = Array.from(e.target.files).slice(0, 5);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = document.createElement('img');
                        img.src = event.target.result;
                        previewContainer.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                });
            });
        });
    });
    </script>
</body>
</html>
